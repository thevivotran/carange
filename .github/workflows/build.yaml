name: CI / Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/thevivotran/carange
  IMAGE_WORKER: ghcr.io/thevivotran/carange-ocr-worker
  IMAGE_EMAIL_WORKER: ghcr.io/thevivotran/carange-email-worker
  PYTHON_VERSION: "3.12"   # must match Dockerfile

jobs:
  # ── 0. Detect changed paths ───────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      worker: ${{ steps.filter.outputs.worker }}
      email_worker: ${{ steps.filter.outputs.email_worker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'main.py'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'alembic/**'
            worker:
              - 'ocr_worker/**'
              - 'requirements.txt'
            email_worker:
              - 'email_worker/**'
              - 'app/services/**'
              - 'app/models/**'
              - 'app/notify/**'
              - 'requirements.txt'

  # ── 1. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check code style and errors
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  # ── 2. Test (against PostgreSQL — the only supported database) ────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carange
          POSTGRES_PASSWORD: carange
          POSTGRES_DB: carange_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carange"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://carange:carange@localhost:5432/carange_test
      TEST_DATABASE_URL: postgresql://carange:carange@localhost:5432/carange_test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for CVEs
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Fresh migration against carange_test
        run: alembic upgrade head

      - name: App import smoke test
        run: python -c "from main import app; print('App startup OK')"

      - name: Schema sync — ORM models must match migration chain
        run: pytest tests/test_schema_sync.py -v

      - name: Run test suite with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=95

  # ── 3. Build & push (main branch only, app files changed) ────────────────────
  build:
    name: Build & Push
    needs: [test, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carange
          POSTGRES_PASSWORD: carange
          POSTGRES_DB: carange
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carange"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TAG="main-$(date -u '+%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Build image locally for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: carange:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container smoke test
        run: |
          docker run -d --name carange-smoke \
            -e DATABASE_URL=postgresql://carange:carange@host.docker.internal:5432/carange \
            --add-host=host.docker.internal:host-gateway \
            -p 6868:6868 carange:smoke

          echo "Waiting for app to start..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:6868/health && break
            sleep 2
          done

          RESPONSE=$(curl -sf http://localhost:6868/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

          docker stop carange-smoke
          docker rm carange-smoke

      - name: Tag and push verified image
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker tag carange:smoke "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG"

  # ── 4. Build & push OCR worker image (main branch only, worker files changed) ─
  build-worker:
    name: Build & Push OCR Worker
    needs: [test, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TAG="main-$(date -u '+%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push OCR worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ocr_worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WORKER }}:${{ steps.tag.outputs.value }}
          # PaddleOCR layer is large — GHA cache prevents re-downloading on every build.
          cache-from: type=gha,scope=ocr-worker
          cache-to: type=gha,mode=max,scope=ocr-worker

  # ── 5. Build & push email worker image ───────────────────────────────────────
  build-email-worker:
    name: Build & Push Email Worker
    needs: [test, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.email_worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TAG="main-$(date -u '+%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push email worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: email_worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_EMAIL_WORKER }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=email-worker
          cache-to: type=gha,mode=max,scope=email-worker
