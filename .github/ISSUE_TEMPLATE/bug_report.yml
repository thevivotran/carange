name: Bug report
description: Report a problem with Carange
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Local (python main.py)
        - k3s / homelab
    validations:
      required: false

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite
        - PostgreSQL
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / device (if UI-related)
      placeholder: e.g. Chrome on Android, Safari desktop
    validations:
      required: false
