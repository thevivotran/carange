# Self-hosting setup — PostgreSQL.
# Choose this path if you want the OCR/email worker queues, the materialized-view
# dashboard, or plan to run multiple app replicas. Otherwise docker-compose.yml
# (SQLite) is simpler and sufficient for most families.
#
#   docker compose -f docker-compose.pg.yml up -d
# and open http://localhost:6868
#
# On first run against an empty database, the app creates all tables from its
# current models and seeds 16 default categories — no manual migration step needed.

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: carange
      POSTGRES_PASSWORD: carange
      POSTGRES_DB: carange
    volumes:
      - carange_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carange"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "6868:6868"
    volumes:
      - carange_data:/data
    environment:
      - DATABASE_URL=postgresql://carange:carange@postgres:5432/carange
      - UPLOAD_DIR=/data/uploads
      # --- Optional: Telegram push notifications ---
      # - TELEGRAM_BOT_TOKEN=
      # - TELEGRAM_CHAT_ID=
      # --- Optional: AI budget insights (requires a self-hosted LLM, e.g. Ollama) ---
      # - OLLAMA_URL=http://your-llm-server:11434
      # - OLLAMA_MODEL=llama3.1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Optional OCR worker — uncomment to enable screenshot import
  # ocr_worker:
  #   build:
  #     context: .
  #     dockerfile: ocr_worker/Dockerfile
  #   volumes:
  #     - carange_data:/data
  #   environment:
  #     - DATABASE_URL=postgresql://carange:carange@postgres:5432/carange
  #     - UPLOAD_DIR=/data/uploads
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

  # Optional Email worker — uncomment to enable bank email ingestion
  # email_worker:
  #   build:
  #     context: .
  #     dockerfile: email_worker/Dockerfile
  #   volumes:
  #     - carange_data:/data
  #   environment:
  #     - DATABASE_URL=postgresql://carange:carange@postgres:5432/carange
  #     - IMAP_HOST=imap.gmail.com
  #     - IMAP_USER=
  #     - IMAP_PASSWORD=   # Gmail App Password (requires 2FA enabled)
  #     - OLLAMA_URL=      # vLLM endpoint for the LLM fallback parser (optional)
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  carange_data:
  carange_pg_data:
