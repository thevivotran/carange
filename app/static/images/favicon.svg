<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#065f46" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- iOS-style squircle background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner highlight at top -->
  <ellipse cx="256" cy="80" rx="200" ry="80" fill="white" opacity="0.08"/>

  <!-- Coin / circle base -->
  <circle cx="256" cy="230" r="130" fill="white" opacity="0.15" filter="url(#shadow)"/>
  <circle cx="256" cy="230" r="118" fill="white" opacity="0.95"/>

  <!-- Currency symbol: stylized ₫ (dong) -->
  <!-- Vertical bar of ₫ -->
  <rect x="244" y="148" width="24" height="164" rx="12" fill="url(#bg)"/>
  <!-- Curved D shape -->
  <path d="M248 165 Q330 165 330 230 Q330 295 248 295 L248 285 Q310 285 310 230 Q310 175 248 175 Z"
        fill="url(#bg)"/>
  <!-- Two horizontal strikethrough bars of ₫ -->
  <rect x="216" y="193" width="80" height="12" rx="6" fill="url(#bg)"/>
  <rect x="216" y="217" width="80" height="12" rx="6" fill="url(#bg)"/>

  <!-- Small upward arrow beneath coin to hint "growth" -->
  <path d="M256 384 L230 354 L243 354 L243 330 L269 330 L269 354 L282 354 Z"
        fill="white" opacity="0.9"/>
</svg>
