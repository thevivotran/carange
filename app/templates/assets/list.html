{% extends "base.html" %}

{% block content %}
<div class="p-6 pb-28 max-w-7xl mx-auto">
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Other Assets</h2>
            <p class="text-gray-600 mt-1">Track currencies, gold, and other assets</p>
        </div>
        <button onclick="openAddAssetModal()" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition flex items-center">
            <i class="fas fa-plus mr-2"></i>Add Asset
        </button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Total Items</p>
            <p class="text-2xl font-bold text-primary" id="asset-sum-count">-</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Total Invested</p>
            <p class="text-2xl font-bold text-blue-600" id="asset-sum-invested">-</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Current Value</p>
            <p class="text-2xl font-bold text-green-600" id="asset-sum-current">-</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Gain / Loss</p>
            <p class="text-2xl font-bold" id="asset-sum-gainloss">-</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <select id="filter-asset-type" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary" onchange="loadAssets()">
                <option value="">All Types</option>
                <option value="currency">Currency</option>
                <option value="gold">Gold</option>
                <option value="other">Other</option>
            </select>
        </div>
    </div>

    <!-- Assets Grid -->
    <div id="assets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Dynamic content -->
    </div>
</div>

<!-- Add/Edit Other Asset Modal -->
<div id="asset-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-800" id="asset-modal-title">Add Asset</h3>
            <button onclick="closeAssetModal()" class="text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <form id="asset-form" class="p-6 space-y-4">
            <input type="hidden" id="asset-id">

            <!-- Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Asset Name</label>
                <input type="text" id="asset-name" required
                       class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                       placeholder="e.g., US Dollar cash, SJC Gold bar">
            </div>

            <!-- Type + Symbol -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Asset Type</label>
                    <select id="asset-type" required
                            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="currency">Currency</option>
                        <option value="gold">Gold</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Symbol / Ticker</label>
                    <input type="text" id="asset-symbol"
                           class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="e.g., USD, EUR, SJC">
                </div>
            </div>

            <!-- Quantity + Unit -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Quantity</label>
                    <input type="number" id="asset-quantity" required min="0" step="any"
                           class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="e.g., 500, 2.5" oninput="updateAssetTotals()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Unit</label>
                    <input type="text" id="asset-unit" required
                           class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="e.g., USD, tael, gram">
                </div>
            </div>

            <!-- VND Values per unit -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Purchase Price per Unit (VND)</label>
                    <input type="number" id="asset-purchase-price" required min="0" step="1"
                           class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="Cost per unit in VND" oninput="updateAssetTotals()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Current Value per Unit (VND)</label>
                    <input type="number" id="asset-current-value" required min="0" step="1"
                           class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="Current value per unit" oninput="updateAssetTotals()">
                </div>
            </div>
            <!-- Auto-calculated totals preview -->
            <div id="asset-totals-preview" class="hidden bg-gray-50 rounded-lg px-4 py-2 text-xs text-gray-600 grid grid-cols-2 gap-2">
                <div>Total Purchase: <span id="preview-purchase" class="font-semibold text-blue-700"></span></div>
                <div>Total Current: <span id="preview-current" class="font-semibold text-green-700"></span></div>
            </div>

            <!-- Notes -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Notes</label>
                <textarea id="asset-notes" rows="3"
                          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                          placeholder="Optional notes..."></textarea>
            </div>

            <!-- Submit -->
            <div class="flex gap-4 pt-4">
                <button type="button" onclick="closeAssetModal()"
                        class="flex-1 px-4 py-3 border rounded-lg hover:bg-gray-50 transition">
                    Cancel
                </button>
                <button type="submit"
                        class="flex-1 px-4 py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition">
                    Save Asset
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    let otherAssets = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadAssets();
        loadAssetsSummary();
    });

    async function loadAssets() {
        try {
            const assetType = document.getElementById('filter-asset-type').value;
            const url = assetType ? '/api/assets/?asset_type=' + assetType : '/api/assets/';
            const response = await fetch(url);
            otherAssets = await response.json();
            renderAssets();
        } catch (error) {
            console.error('Error loading assets:', error);
        }
    }

    async function loadAssetsSummary() {
        try {
            const response = await fetch('/api/assets/stats/summary');
            const data = await response.json();
            document.getElementById('asset-sum-count').textContent = data.total_assets_count;
            document.getElementById('asset-sum-invested').textContent = formatVND(data.total_invested_vnd);
            document.getElementById('asset-sum-current').textContent = formatVND(data.total_current_value_vnd);
            const glEl = document.getElementById('asset-sum-gainloss');
            const gl = data.total_gain_loss_vnd;
            glEl.textContent = (gl >= 0 ? '+' : '') + formatVND(gl) + ' (' + (gl >= 0 ? '+' : '') + data.total_gain_loss_pct + '%)';
            glEl.className = 'text-2xl font-bold ' + (gl >= 0 ? 'text-green-600' : 'text-red-600');
        } catch (error) {
            console.error('Error loading assets summary:', error);
        }
    }

    function renderAssets() {
        const grid = document.getElementById('assets-grid');
        while (grid.firstChild) grid.removeChild(grid.firstChild);

        if (otherAssets.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'col-span-3 text-center py-16 text-gray-400';
            const ico = document.createElement('i');
            ico.className = 'fas fa-coins text-4xl mb-3 block';
            const msg = document.createElement('p');
            msg.textContent = 'No assets yet. Add your first asset above.';
            empty.appendChild(ico);
            empty.appendChild(msg);
            grid.appendChild(empty);
            return;
        }

        const typeStyles = {
            currency: { bg: 'bg-blue-100', text: 'text-blue-800', icon: 'fas fa-money-bill-wave' },
            gold:     { bg: 'bg-yellow-100', text: 'text-yellow-800', icon: 'fas fa-star' },
            other:    { bg: 'bg-gray-100', text: 'text-gray-700', icon: 'fas fa-box' },
        };

        otherAssets.forEach(function(asset) {
            const gainLoss = asset.current_value_vnd - asset.purchase_price_vnd;
            const gainLossPct = asset.purchase_price_vnd > 0
                ? ((gainLoss / asset.purchase_price_vnd) * 100).toFixed(2) : '0.00';
            const style = typeStyles[asset.asset_type] || typeStyles.other;

            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-md p-6';

            // Header
            const header = document.createElement('div');
            header.className = 'flex justify-between items-start mb-4';
            const headerLeft = document.createElement('div');
            const nameEl = document.createElement('h3');
            nameEl.className = 'text-lg font-semibold text-gray-800';
            nameEl.textContent = asset.name;
            headerLeft.appendChild(nameEl);
            if (asset.symbol) {
                const symEl = document.createElement('p');
                symEl.className = 'text-sm text-gray-500 font-mono';
                symEl.textContent = asset.symbol;
                headerLeft.appendChild(symEl);
            }
            const badge = document.createElement('span');
            badge.className = 'px-2 py-1 text-xs font-medium rounded-full flex items-center gap-1 ' + style.bg + ' ' + style.text;
            const badgeIco = document.createElement('i');
            badgeIco.className = style.icon;
            badge.appendChild(badgeIco);
            badge.appendChild(document.createTextNode(' ' + asset.asset_type));
            header.appendChild(headerLeft);
            header.appendChild(badge);
            card.appendChild(header);

            // Quantity row
            const qtyRow = document.createElement('div');
            qtyRow.className = 'flex justify-between text-sm mb-3 p-3 bg-gray-50 rounded-lg';
            const qLbl = document.createElement('span');
            qLbl.className = 'text-gray-500';
            qLbl.textContent = 'Quantity held:';
            const qVal = document.createElement('span');
            qVal.className = 'font-semibold text-gray-800';
            qVal.textContent = asset.quantity.toLocaleString() + ' ' + asset.unit;
            qtyRow.appendChild(qLbl); qtyRow.appendChild(qVal);
            card.appendChild(qtyRow);

            // VND values
            const amtBlock = document.createElement('div');
            amtBlock.className = 'space-y-2 mb-4';

            const perUnitPurchase = asset.quantity > 0 ? asset.purchase_price_vnd / asset.quantity : asset.purchase_price_vnd;
            const perUnitCurrent  = asset.quantity > 0 ? asset.current_value_vnd  / asset.quantity : asset.current_value_vnd;

            const purchRow = document.createElement('div');
            purchRow.className = 'flex justify-between text-sm';
            const pLbl = document.createElement('span'); pLbl.className = 'text-gray-500'; pLbl.textContent = 'Purchase Price:';
            const pVal = document.createElement('span'); pVal.className = 'font-semibold text-blue-700';
            pVal.textContent = formatVND(perUnitPurchase) + '/unit · ' + formatVND(asset.purchase_price_vnd) + ' total';
            purchRow.appendChild(pLbl); purchRow.appendChild(pVal);

            const curRow = document.createElement('div');
            curRow.className = 'flex justify-between text-sm';
            const cLbl = document.createElement('span'); cLbl.className = 'text-gray-500'; cLbl.textContent = 'Current Value:';
            const cVal = document.createElement('span'); cVal.className = 'font-semibold text-green-700';
            cVal.textContent = formatVND(perUnitCurrent) + '/unit · ' + formatVND(asset.current_value_vnd) + ' total';
            curRow.appendChild(cLbl); curRow.appendChild(cVal);

            const glRow = document.createElement('div');
            glRow.className = 'flex justify-between text-sm pt-2 border-t';
            const glLbl = document.createElement('span'); glLbl.className = 'text-gray-500'; glLbl.textContent = 'Gain / Loss:';
            const glVal = document.createElement('span');
            glVal.className = 'font-semibold ' + (gainLoss >= 0 ? 'text-green-600' : 'text-red-600');
            glVal.textContent = (gainLoss >= 0 ? '+' : '') + formatVND(gainLoss) + ' (' + (gainLoss >= 0 ? '+' : '') + gainLossPct + '%)';
            glRow.appendChild(glLbl); glRow.appendChild(glVal);

            amtBlock.appendChild(purchRow);
            amtBlock.appendChild(curRow);
            amtBlock.appendChild(glRow);
            card.appendChild(amtBlock);

            // Quick price update
            const quickUpdateDiv = document.createElement('div');
            quickUpdateDiv.className = 'flex items-center gap-2 mb-3 bg-yellow-50 rounded-lg px-3 py-2';
            const quickLbl = document.createElement('span');
            quickLbl.className = 'text-xs text-gray-500 flex-shrink-0';
            quickLbl.textContent = 'New price/unit:';
            const quickInput = document.createElement('input');
            quickInput.type = 'number';
            quickInput.min = '0';
            quickInput.step = '1';
            quickInput.className = 'flex-1 border rounded px-2 py-1 text-sm focus:ring-2 focus:ring-primary text-right min-w-0';
            quickInput.value = asset.quantity > 0 ? Math.round(asset.current_value_vnd / asset.quantity) : asset.current_value_vnd;
            quickInput.title = 'Current value per unit in VND';
            const quickBtn = document.createElement('button');
            quickBtn.className = 'flex-shrink-0 text-xs bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600 transition';
            quickBtn.textContent = 'Update';
            quickBtn.addEventListener('click', function() {
                const newPerUnit = parseFloat(quickInput.value);
                if (isNaN(newPerUnit) || newPerUnit < 0) { showToast('Enter a valid price', 'error'); return; }
                const newTotal = newPerUnit * asset.quantity;
                fetch('/api/assets/' + asset.id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_value_vnd: newTotal })
                }).then(function(res) {
                    if (res.ok) {
                        loadAssets();
                        loadAssetsSummary();
                        showToast('Price updated', 'success');
                    } else {
                        res.json().then(function(err) { showToast('Error: ' + (err.detail || 'Failed'), 'error'); });
                    }
                }).catch(function() { showToast('Failed to update price', 'error'); });
            });
            quickUpdateDiv.appendChild(quickLbl);
            quickUpdateDiv.appendChild(quickInput);
            quickUpdateDiv.appendChild(quickBtn);
            card.appendChild(quickUpdateDiv);

            // Updated at
            if (asset.updated_at) {
                const dateEl = document.createElement('div');
                dateEl.className = 'text-sm text-gray-500 mb-4';
                const dateIco = document.createElement('i');
                dateIco.className = 'fas fa-clock mr-2 w-4';
                dateEl.appendChild(dateIco);
                const updatedDate = new Date(asset.updated_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                dateEl.appendChild(document.createTextNode('Updated: ' + updatedDate));
                card.appendChild(dateEl);
            }

            // Notes
            if (asset.notes) {
                const notesEl = document.createElement('p');
                notesEl.className = 'text-sm text-gray-600 mb-4 italic';
                notesEl.textContent = '“' + asset.notes + '”';
                card.appendChild(notesEl);
            }

            // Actions
            const actDiv = document.createElement('div');
            actDiv.className = 'flex gap-2 pt-4 border-t';

            const editBtn = document.createElement('button');
            editBtn.className = 'flex-1 flex items-center justify-center gap-1 px-3 py-2 text-blue-600 hover:bg-blue-50 rounded-lg transition text-sm';
            const editIco = document.createElement('i');
            editIco.className = 'fas fa-edit';
            editBtn.appendChild(editIco);
            editBtn.appendChild(document.createTextNode(' Edit'));
            editBtn.addEventListener('click', function() { editAsset(asset.id); });
            actDiv.appendChild(editBtn);

            const delBtn = document.createElement('button');
            delBtn.className = 'px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition';
            delBtn.title = 'Delete';
            const delIco = document.createElement('i');
            delIco.className = 'fas fa-trash';
            delBtn.appendChild(delIco);
            delBtn.addEventListener('click', function() {
                deleteWithUndo(card, '/api/assets/' + asset.id, function() {
                    loadAssets(); loadAssetsSummary();
                }, asset.name);
            });
            actDiv.appendChild(delBtn);

            card.appendChild(actDiv);
            grid.appendChild(card);
        });
    }

    function updateAssetTotals() {
        const qty      = parseFloat(document.getElementById('asset-quantity').value) || 0;
        const purchase = parseFloat(document.getElementById('asset-purchase-price').value) || 0;
        const current  = parseFloat(document.getElementById('asset-current-value').value) || 0;
        const preview  = document.getElementById('asset-totals-preview');
        if (qty > 0 && (purchase > 0 || current > 0)) {
            document.getElementById('preview-purchase').textContent = formatVND(purchase * qty);
            document.getElementById('preview-current').textContent  = formatVND(current  * qty);
            preview.classList.remove('hidden');
        } else {
            preview.classList.add('hidden');
        }
    }

    function openAddAssetModal() {
        document.getElementById('asset-modal-title').textContent = 'Add Asset';
        document.getElementById('asset-form').reset();
        document.getElementById('asset-id').value = '';
        document.getElementById('asset-totals-preview').classList.add('hidden');
        document.getElementById('asset-modal').classList.remove('hidden');
    }

    function closeAssetModal() {
        document.getElementById('asset-modal').classList.add('hidden');
    }

    function editAsset(id) {
        const asset = otherAssets.find(function(a) { return a.id === id; });
        if (!asset) return;
        document.getElementById('asset-modal-title').textContent = 'Edit Asset';
        document.getElementById('asset-id').value = asset.id;
        document.getElementById('asset-name').value = asset.name;
        document.getElementById('asset-type').value = asset.asset_type;
        document.getElementById('asset-symbol').value = asset.symbol || '';
        document.getElementById('asset-quantity').value = asset.quantity;
        document.getElementById('asset-unit').value = asset.unit;
        const perUnitPurchase = asset.quantity > 0 ? Math.round(asset.purchase_price_vnd / asset.quantity) : asset.purchase_price_vnd;
        const perUnitCurrent  = asset.quantity > 0 ? Math.round(asset.current_value_vnd  / asset.quantity) : asset.current_value_vnd;
        document.getElementById('asset-purchase-price').value = perUnitPurchase;
        document.getElementById('asset-current-value').value = perUnitCurrent;
        document.getElementById('asset-notes').value = asset.notes || '';
        document.getElementById('asset-modal').classList.remove('hidden');
        updateAssetTotals();
    }

    document.getElementById('asset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const assetId = document.getElementById('asset-id').value;
        const qty = parseFloat(document.getElementById('asset-quantity').value) || 1;
        const data = {
            name: document.getElementById('asset-name').value,
            asset_type: document.getElementById('asset-type').value,
            symbol: document.getElementById('asset-symbol').value || null,
            quantity: qty,
            unit: document.getElementById('asset-unit').value,
            purchase_price_vnd: parseFloat(document.getElementById('asset-purchase-price').value) * qty,
            current_value_vnd: parseFloat(document.getElementById('asset-current-value').value) * qty,
            notes: document.getElementById('asset-notes').value || null,
        };
        try {
            const url = assetId ? '/api/assets/' + assetId : '/api/assets/';
            const method = assetId ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                closeAssetModal();
                loadAssets();
                loadAssetsSummary();
            } else {
                const error = await response.json();
                const msg = typeof error.detail === 'object' ? JSON.stringify(error.detail) : error.detail;
                showToast('Error: ' + msg, 'error');
            }
        } catch (error) {
            console.error('Error saving asset:', error);
            showToast('Failed to save asset', 'error');
        }
    });
</script>
{% endblock %}
