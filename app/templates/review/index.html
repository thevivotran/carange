{% extends "base.html" %}

{% block content %}
<div class="p-6 pb-28 max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Review Inbox</h2>
            <p class="text-gray-600 mt-1">Transactions pending confirmation before saving</p>
        </div>
        <button onclick="htmx.trigger('#review-list', 'refresh')"
                class="flex items-center gap-2 border rounded-lg px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 transition">
            <i class="fas fa-sync-alt text-gray-500"></i> Refresh
        </button>
    </div>

    <!-- Review list (HTMX lazy-load) -->
    <div id="review-list"
         hx-get="/fragments/review/list"
         hx-trigger="load, review-updated from:body, refresh"
         hx-swap="innerHTML">
        <div class="flex justify-center py-16 text-gray-400">
            <div class="text-center">
                <i class="fas fa-spinner fa-spin text-2xl mb-3"></i>
                <p class="text-sm">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script>
function approveRow(txId) {
    const row = document.getElementById('review-row-' + txId);
    const catEl = row.querySelector('.cat-select');
    const descEl = row.querySelector('.desc-input');
    const payload = {};
    if (catEl) payload.category_id = parseInt(catEl.value);
    if (descEl && descEl.value !== descEl.dataset.original) payload.description = descEl.value;

    fetch('/api/review/' + txId + '/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(r => {
        if (r.ok) {
            row.style.opacity = '0';
            row.style.transition = 'opacity 0.3s';
            setTimeout(() => {
                row.remove();
                updateCount(-1);
                showToast('Transaction confirmed', 'success');
            }, 300);
        }
    });
}

function rejectRow(txId) {
    showConfirm('Skip this transaction?', async function() {
        const r = await fetch('/api/review/' + txId + '/reject', { method: 'POST' });
        if (r.ok) {
            const row = document.getElementById('review-row-' + txId);
            row.style.opacity = '0';
            row.style.transition = 'opacity 0.3s';
            setTimeout(() => {
                row.remove();
                updateCount(-1);
                showToast('Transaction skipped', 'warning');
            }, 300);
        }
    });
}

async function rememberAsRule(txId) {
    const res = await fetch('/api/review/' + txId + '/rule-prefill');
    const data = await res.json();
    // Pre-fill the rule create form in the Rules page and navigate to it
    sessionStorage.setItem('rule_prefill', JSON.stringify(data));
    window.location.href = '/rules';
}

async function approveAll() {
    const rows = document.querySelectorAll('[id^="review-row-"]');
    if (!rows.length) return;
    const ok = await Alpine.store('confirm').show(
        'Approve all ' + rows.length + ' pending transactions?',
        'Approve all',
        'bg-green-600 hover:bg-green-700'
    );
    if (!ok) return;

    let approved = 0;
    for (const row of rows) {
        const txId = row.id.replace('review-row-', '');
        const catEl = row.querySelector('.cat-select');
        const descEl = row.querySelector('.desc-input');
        const payload = {};
        if (catEl) payload.category_id = parseInt(catEl.value);
        if (descEl && descEl.value !== descEl.dataset.original) payload.description = descEl.value;
        try {
            const r = await fetch('/api/review/' + txId + '/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (r.ok) {
                row.style.opacity = '0';
                row.style.transition = 'opacity 0.2s';
                setTimeout(() => row.remove(), 200);
                approved++;
            }
        } catch (_) {}
    }
    updateCount(-approved);
    showToast(approved + ' transaction' + (approved !== 1 ? 's' : '') + ' approved', 'success');
}

function updateCount(delta) {
    const badge = document.getElementById('review-count-badge');
    if (badge) {
        const n = Math.max(0, (parseInt(badge.textContent) || 0) + delta);
        badge.textContent = n;
        badge.closest('[data-review-badge]').classList.toggle('hidden', n === 0);
    }
}
</script>
{% endblock %}
