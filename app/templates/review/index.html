{% extends "base.html" %}
{% block title %}Review Inbox — Carange{% endblock %}

{% block content %}
<div class="p-6 pb-28 max-w-5xl mx-auto">

  <!-- Header — consistent with Transactions page -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
      <h2 class="text-3xl font-bold text-gray-800">Review Inbox</h2>
      <p class="text-gray-600 mt-1">Confirm or skip transactions before they're saved</p>
    </div>
    <div class="flex items-center gap-2">
      <!-- Approve-all rendered by fragment so count is live -->
      <div id="review-header-actions"></div>
      <!-- Refresh — icon-button style matching Transactions export button -->
      <button onclick="htmx.trigger('#review-list', 'refresh')"
              title="Refresh inbox"
              class="w-11 h-11 flex items-center justify-center bg-white border border-gray-300 text-gray-500 rounded-lg hover:bg-gray-50 hover:text-gray-700 transition flex-shrink-0">
        <i class="fas fa-sync-alt text-sm"></i>
      </button>
    </div>
  </div>

  <!-- Review list (HTMX lazy-load) -->
  <div id="review-list"
       hx-get="/fragments/review/list"
       hx-trigger="load, review-updated from:body, refresh"
       hx-target="this"
       hx-swap="innerHTML">
    <div class="flex justify-center py-20 text-gray-400">
      <div class="text-center">
        <i class="fas fa-spinner fa-spin text-2xl mb-3 block"></i>
        <p class="text-sm">Loading inbox…</p>
      </div>
    </div>
  </div>

</div>

<script>
function approveRow(txId) {
    const row = document.getElementById('review-row-' + txId);
    const catEl = row.querySelector('.cat-select');
    const descEl = row.querySelector('.desc-input');
    const payload = {};
    if (catEl) payload.category_id = parseInt(catEl.value);
    if (descEl && descEl.value !== descEl.dataset.original) payload.description = descEl.value;

    fetch('/api/review/' + txId + '/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(r => {
        if (r.ok) {
            row.style.opacity = '0';
            row.style.transform = 'translateX(8px)';
            row.style.transition = 'opacity 0.25s, transform 0.25s';
            setTimeout(() => {
                row.remove();
                _reviewUpdateCount(-1);
                showToast('Transaction confirmed', 'success');
            }, 250);
        }
    });
}

function rejectRow(txId) {
    showConfirm('Skip this transaction? It will be removed from the inbox.', async function() {
        const r = await fetch('/api/review/' + txId + '/reject', { method: 'POST' });
        if (r.ok) {
            const row = document.getElementById('review-row-' + txId);
            row.style.opacity = '0';
            row.style.transform = 'translateX(-8px)';
            row.style.transition = 'opacity 0.25s, transform 0.25s';
            setTimeout(() => {
                row.remove();
                _reviewUpdateCount(-1);
                showToast('Transaction skipped', 'warning');
            }, 250);
        }
    }, 'Skip', 'bg-red-600 hover:bg-red-700');
}

async function rememberAsRule(txId) {
    const res = await fetch('/api/review/' + txId + '/rule-prefill');
    const data = await res.json();
    sessionStorage.setItem('rule_prefill', JSON.stringify(data));
    window.location.href = '/rules';
}

async function approveAll() {
    const rows = document.querySelectorAll('[id^="review-row-"]');
    if (!rows.length) return;
    const ok = await Alpine.store('confirm').show(
        'Approve all ' + rows.length + ' pending transactions?',
        'Approve all',
        'bg-green-600 hover:bg-green-700'
    );
    if (!ok) return;

    let approved = 0;
    for (const row of rows) {
        const txId = row.id.replace('review-row-', '');
        const catEl = row.querySelector('.cat-select');
        const descEl = row.querySelector('.desc-input');
        const payload = {};
        if (catEl) payload.category_id = parseInt(catEl.value);
        if (descEl && descEl.value !== descEl.dataset.original) payload.description = descEl.value;
        try {
            const r = await fetch('/api/review/' + txId + '/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (r.ok) {
                row.style.opacity = '0';
                row.style.transition = 'opacity 0.15s';
                setTimeout(() => row.remove(), 150);
                approved++;
            }
        } catch (_) {}
    }
    _reviewUpdateCount(-approved);
    showToast(approved + ' transaction' + (approved !== 1 ? 's' : '') + ' confirmed', 'success');
}

function _reviewUpdateCount(delta) {
    // ── All nav badges (sidebar + both mobile variants) ──────────────────
    const badge = document.getElementById('review-count-badge');
    if (badge) {
        const n = Math.max(0, (parseInt(badge.textContent) || 0) + delta);
        badge.textContent = n;
        badge.closest('[data-review-badge]').classList.toggle('hidden', n === 0);
    }
    ['mobile-bottom-review-badge', 'mobile-more-review-badge'].forEach(function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const n = Math.max(0, (parseInt(el.textContent) || 0) + delta);
        el.textContent = n;
        el.classList.toggle('hidden', n === 0);
    });

    // ── Inline pending pill + approve-all button ──────────────────────────
    const pill = document.getElementById('review-pending-pill');
    if (!pill) return;
    const n = Math.max(0, (parseInt(pill.dataset.count) || 0) + delta);
    pill.dataset.count = n;
    const countEl = pill.querySelector('[data-count-label]');
    if (countEl) countEl.textContent = n + ' transaction' + (n !== 1 ? 's' : '') + ' pending';

    // Hide "Approve all" when only 0 or 1 item remains
    const approveAllBtn = document.getElementById('review-approve-all-btn');
    if (approveAllBtn) approveAllBtn.classList.toggle('hidden', n <= 1);

    // Reload to show empty state when all cleared
    if (n === 0) {
        const list = document.getElementById('review-list');
        if (list) htmx.trigger(list, 'refresh');
    }
}
</script>
{% endblock %}
