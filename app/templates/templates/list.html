{% extends "base.html" %}

{% block content %}
<div class="p-6 pb-28 max-w-7xl mx-auto">
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Templates</h2>
            <p class="text-gray-600 mt-1">Quick-entry shortcuts for common transactions. Tap <i class="fas fa-clock text-indigo-500"></i> on any template to make it run automatically on a schedule.</p>
        </div>
        <button onclick="openAddModal()" class="bg-primary text-white px-5 py-2.5 rounded-lg hover:bg-blue-600 transition flex items-center gap-2">
            <i class="fas fa-plus"></i> Add Template
        </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl shadow-sm border p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <select id="filter-type" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary"
                    onchange="_reloadTemplates()">
                <option value="">All Types</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <select id="filter-category" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary"
                    onchange="_reloadTemplates()">
                <option value="">All Categories</option>
            </select>

            <select id="filter-status" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary"
                    onchange="_reloadTemplates()">
                <option value="">All Status</option>
                <option value="true" selected>Active</option>
                <option value="false">Inactive</option>
            </select>

            <select id="filter-schedule" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary"
                    onchange="_reloadTemplates()">
                <option value="">All Schedules</option>
                <option value="yes">Recurring only</option>
                <option value="no">One-time only</option>
            </select>
        </div>
    </div>

    <!-- Templates List -->
    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
        <div id="templates-table-body"
             hx-get="/fragments/templates/rows"
             hx-trigger="load, templates-updated from:body"
             hx-swap="innerHTML">
            <div class="flex justify-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl"></i>
            </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center p-4 border-t">
            <p class="text-sm text-gray-600" id="pagination-info">Loading…</p>
            <div class="flex gap-2">
                <button onclick="prevPage()" id="prev-btn"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-50 text-gray-700 disabled:opacity-50"
                        disabled>Previous</button>
                <button onclick="nextPage()" id="next-btn"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-50 text-gray-700 disabled:opacity-50"
                        disabled>Next</button>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Template Modal -->
<div id="template-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full max-h-[90dvh] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center flex-shrink-0">
            <h3 class="text-xl font-bold text-gray-800" id="modal-title">Add Template</h3>
            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700" aria-label="Close">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <form id="template-form" class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 overflow-y-auto overscroll-contain p-6 space-y-4">
            <input type="hidden" id="template-id">

            <!-- Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Template Name</label>
                <input type="text" id="name" required
                       class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                       placeholder="e.g., Monthly Salary, Grocery Shopping">
            </div>

            <!-- Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Type</label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="type" value="income" class="hidden peer" onchange="loadModalCategories()">
                        <div class="text-center py-3 border-2 rounded-lg peer-checked:border-green-500 peer-checked:bg-green-50 transition">
                            <i class="fas fa-arrow-down text-green-600 text-xl mb-1"></i>
                            <p class="text-sm font-medium">Income</p>
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="type" value="expense" class="hidden peer" checked onchange="loadModalCategories()">
                        <div class="text-center py-3 border-2 rounded-lg peer-checked:border-red-500 peer-checked:bg-red-50 transition">
                            <i class="fas fa-arrow-up text-red-600 text-xl mb-1"></i>
                            <p class="text-sm font-medium">Expense</p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Amount -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount (VND)</label>
                <input type="number" id="amount" required min="0" step="1"
                       class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                       placeholder="Enter amount">
            </div>

            <!-- Category -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                <select id="category" required
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">Select Category</option>
                </select>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <input type="text" id="description"
                       class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent"
                       placeholder="Optional description">
            </div>

            <!-- Payment Method -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Payment Method</label>
                <select id="payment-method"
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="cash">Cash</option>
                    <option value="credit_card">Credit Card</option>
                    <option value="debit_card">Debit Card</option>
                    <option value="bank_transfer">Bank Transfer</option>
                    <option value="mobile_payment">Mobile Payment</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Active Status -->
            <div class="flex items-center">
                <input type="checkbox" id="is-active" class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary" checked>
                <label for="is-active" class="ml-3 text-sm font-medium text-gray-700">Active</label>
            </div>

        </div>
        <div class="p-6 border-t flex gap-4 flex-shrink-0">
            <button type="button" onclick="closeModal()"
                    class="flex-1 px-4 py-3 border rounded-lg hover:bg-gray-50 transition">
                Cancel
            </button>
            <button type="submit"
                    class="flex-1 px-4 py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition">
                Save Template
            </button>
        </div>
        </form>
    </div>
</div>

<!-- Recurring Schedule Modal -->
<div id="recurring-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full max-h-[90dvh] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center flex-shrink-0">
            <h3 class="text-xl font-bold text-gray-800">Recurring Schedule</h3>
            <button onclick="closeRecurringModal()" class="text-gray-500 hover:text-gray-700" aria-label="Close">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <form id="recurring-form" class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 overflow-y-auto overscroll-contain p-6 space-y-4">
            <input type="hidden" id="recurring-template-id">

            <p class="text-sm text-gray-600">Make <span id="recurring-template-name" class="font-medium text-gray-800"></span> run automatically and create transactions on a schedule.</p>

            <!-- Cadence -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Frequency</label>
                <select id="recurring-cadence"
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">Not recurring (Quick Entry)</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <!-- Next run date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Next Run Date</label>
                <input type="date" id="recurring-next-run"
                       class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <!-- Auto-approve -->
            <div class="flex items-center">
                <input type="checkbox" id="recurring-auto-approve" class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary">
                <label for="recurring-auto-approve" class="ml-3 text-sm font-medium text-gray-700">Auto-approve generated transactions (skip review)</label>
            </div>
        </div>
        <div class="p-6 border-t flex gap-4 flex-shrink-0">
            <button type="button" onclick="closeRecurringModal()"
                    class="flex-1 px-4 py-3 border rounded-lg hover:bg-gray-50 transition">
                Cancel
            </button>
            <button type="submit"
                    class="flex-1 px-4 py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition">
                Save Schedule
            </button>
        </div>
        </form>
    </div>
</div>

<script>
    let currentPage = 0;
    const pageSize = 20;

    // Inject filter params into HTMX templates request
    document.addEventListener('htmx:configRequest', function(evt) {
        if (evt.target && evt.target.id === 'templates-table-body') {
            evt.detail.parameters.type = document.getElementById('filter-type').value;
            evt.detail.parameters.category_id = document.getElementById('filter-category').value;
            evt.detail.parameters.is_active = document.getElementById('filter-status').value;
            evt.detail.parameters.has_cadence = document.getElementById('filter-schedule').value;
            evt.detail.parameters.skip = currentPage * pageSize;
            evt.detail.parameters.limit = pageSize;
        }
    });

    // Update pagination info from HX-Trigger header
    document.addEventListener('updatePagination', function(e) {
        const { count, skip, limit } = e.detail;
        document.getElementById('pagination-info').textContent =
            'Page ' + (Math.floor(skip / limit) + 1) + ' - Showing ' + count + ' templates';
        document.getElementById('prev-btn').disabled = skip === 0;
        document.getElementById('next-btn').disabled = count < limit;
    });

    function _reloadTemplates() {
        document.body.dispatchEvent(new CustomEvent('templates-updated'));
    }

    function prevPage() {
        if (currentPage > 0) { currentPage--; _reloadTemplates(); }
    }

    function nextPage() {
        currentPage++;
        _reloadTemplates();
    }

    async function loadModalCategories(selectedId) {
        const type = document.querySelector('input[name="type"]:checked').value;
        const sel = document.getElementById('category');
        const res = await fetch('/api/categories/?type=' + type);
        const cats = await res.json();
        sel.replaceChildren();
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = 'Select Category';
        sel.appendChild(placeholder);
        cats.filter(c => c.is_active).forEach(function(c) {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name;
            if (selectedId && c.id === selectedId) opt.selected = true;
            sel.appendChild(opt);
        });
        // Also populate filter-category on first call
        const filterSel = document.getElementById('filter-category');
        if (filterSel.options.length <= 1) {
            const allRes = await fetch('/api/categories/');
            const allCats = await allRes.json();
            allCats.filter(c => c.is_active).forEach(function(c) {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                filterSel.appendChild(opt);
            });
        }
    }

    function openAddModal() {
        document.getElementById('modal-title').textContent = 'Add Template';
        document.getElementById('template-form').reset();
        document.getElementById('template-id').value = '';
        document.getElementById('template-modal').classList.remove('hidden');
        loadModalCategories();
    }

    function closeModal() {
        document.getElementById('template-modal').classList.add('hidden');
    }

    document.getElementById('template-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const templateId = document.getElementById('template-id').value;
        const data = {
            name: document.getElementById('name').value,
            amount: parseFloat(document.getElementById('amount').value),
            type: document.querySelector('input[name="type"]:checked').value,
            category_id: parseInt(document.getElementById('category').value),
            description: document.getElementById('description').value,
            payment_method: document.getElementById('payment-method').value,
            is_active: document.getElementById('is-active').checked,
        };
        try {
            const url = templateId ? '/api/templates/' + templateId : '/api/templates/';
            const method = templateId ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            if (res.ok) {
                closeModal();
                _reloadTemplates();
            } else {
                const err = await res.json();
                const msg = typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail;
                showToast('Error: ' + msg, 'error');
            }
        } catch(e) {
            showToast('Failed to save template', 'error');
        }
    });

    async function editTemplate(id) {
        try {
            const res = await fetch('/api/templates/' + id);
            const t = await res.json();
            document.getElementById('modal-title').textContent = 'Edit Template';
            document.getElementById('template-id').value = t.id;
            document.getElementById('name').value = t.name;
            document.getElementById('amount').value = t.amount;
            document.querySelector('input[name="type"][value="' + t.type + '"]').checked = true;
            document.getElementById('description').value = t.description || '';
            document.getElementById('payment-method').value = t.payment_method;
            document.getElementById('is-active').checked = t.is_active;
            await loadModalCategories(t.category_id);
            document.getElementById('category').value = t.category_id;
            document.getElementById('template-modal').classList.remove('hidden');
        } catch(e) {
            showToast('Failed to load template', 'error');
        }
    }

    async function openRecurringModal(id) {
        try {
            const res = await fetch('/api/templates/' + id);
            const t = await res.json();
            document.getElementById('recurring-template-id').value = t.id;
            document.getElementById('recurring-template-name').textContent = t.name;
            document.getElementById('recurring-cadence').value = t.cadence || '';
            document.getElementById('recurring-next-run').value = t.next_run_at || '';
            document.getElementById('recurring-auto-approve').checked = !!t.auto_approve;
            document.getElementById('recurring-modal').classList.remove('hidden');
        } catch(e) {
            showToast('Failed to load template', 'error');
        }
    }

    function closeRecurringModal() {
        document.getElementById('recurring-modal').classList.add('hidden');
    }

    document.getElementById('recurring-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const templateId = document.getElementById('recurring-template-id').value;
        const cadence = document.getElementById('recurring-cadence').value;
        const nextRun = document.getElementById('recurring-next-run').value;

        if (cadence && !nextRun) {
            showToast('Please pick a next run date', 'error');
            return;
        }

        const data = {
            cadence: cadence || null,
            next_run_at: cadence ? nextRun : null,
            auto_approve: document.getElementById('recurring-auto-approve').checked,
        };
        try {
            const res = await fetch('/api/templates/' + templateId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            if (res.ok) {
                closeRecurringModal();
                _reloadTemplates();
                showToast('Recurring schedule saved', 'success');
            } else {
                const err = await res.json();
                const msg = typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail;
                showToast('Error: ' + msg, 'error');
            }
        } catch(e) {
            showToast('Failed to save schedule', 'error');
        }
    });

    async function useTemplate(id) {
        try {
            const res = await fetch('/api/templates/' + id);
            const template = await res.json();

            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] flex items-center justify-center p-4';
            const box = document.createElement('div');
            box.className = 'bg-white rounded-xl shadow-xl p-6 w-80 space-y-4';
            const title = document.createElement('h3');
            title.className = 'text-lg font-semibold text-gray-800';
            title.textContent = 'Use Template: ' + template.name;
            const label = document.createElement('label');
            label.className = 'block text-sm font-medium text-gray-700';
            label.textContent = 'Transaction Date';
            const dateInput = document.createElement('input');
            dateInput.type = 'date';
            dateInput.className = 'w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary';
            dateInput.value = new Date().toISOString().split('T')[0];
            const btnRow = document.createElement('div');
            btnRow.className = 'flex gap-3';
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'flex-1 px-4 py-2 border rounded-lg hover:bg-gray-50';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.addEventListener('click', function() { document.body.removeChild(overlay); });
            const applyBtn = document.createElement('button');
            applyBtn.className = 'flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600';
            applyBtn.textContent = 'Apply';
            applyBtn.addEventListener('click', async function() {
                const chosenDate = dateInput.value;
                if (!chosenDate) { showToast('Please pick a date', 'error'); return; }
                document.body.removeChild(overlay);
                try {
                    const createRes = await fetch('/api/transactions/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: chosenDate,
                            amount: template.amount,
                            type: template.type,
                            category_id: template.category_id,
                            description: template.description || '',
                            payment_method: template.payment_method || 'cash',
                            is_savings_related: false,
                        }),
                    });
                    if (createRes.ok) {
                        showToast('Transaction created from template: ' + template.name, 'success');
                    } else {
                        const err = await createRes.json();
                        showToast('Error: ' + (err.detail || 'Failed'), 'error');
                    }
                } catch(e) {
                    showToast('Failed to create transaction', 'error');
                }
            });
            btnRow.appendChild(cancelBtn);
            btnRow.appendChild(applyBtn);
            box.appendChild(title);
            box.appendChild(label);
            box.appendChild(dateInput);
            box.appendChild(btnRow);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
        } catch(e) {
            showToast('Failed to load template', 'error');
        }
    }

    // Initialize filter categories on load
    document.addEventListener('DOMContentLoaded', async function() {
        const filterSel = document.getElementById('filter-category');
        try {
            const res = await fetch('/api/categories/');
            const cats = await res.json();
            cats.filter(c => c.is_active).forEach(function(c) {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                filterSel.appendChild(opt);
            });
        } catch(e) { /* non-critical */ }
    });
</script>
{% endblock %}
