{% extends "base.html" %}

{% block content %}
<div class="p-6 pb-28 max-w-7xl mx-auto">
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Financial Projects</h2>
            <p class="text-gray-600 mt-1">Track your family's financial goals and projects</p>
        </div>
        <button onclick="openProjectModal()" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition flex items-center">
            <i class="fas fa-plus mr-2"></i>Add Project
        </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <select id="filter-status" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary"
                    onchange="document.body.dispatchEvent(new CustomEvent('projects-updated'))">
                <option value="">All Status</option>
                <option value="planning">Planning</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
            </select>
            <select id="filter-type" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary"
                    onchange="document.body.dispatchEvent(new CustomEvent('projects-updated'))">
                <option value="">All Types</option>
                <option value="real_estate">Real Estate</option>
                <option value="investment">Investment</option>
                <option value="vehicle">Vehicle</option>
                <option value="education">Education</option>
                <option value="vacation">Vacation</option>
                <option value="custom">Custom</option>
            </select>
        </div>
    </div>

    <!-- HTMX region: summary cards + project grid -->
    <div id="projects-grid-region"
         hx-get="/fragments/projects/grid"
         hx-trigger="load, projects-updated from:body"
         hx-target="this"
         hx-swap="outerHTML">
    </div>
</div>

<!-- ===== Add/Edit Project Modal ===== -->
<div id="project-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full max-h-[90dvh] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center flex-shrink-0">
            <h3 class="text-xl font-bold text-gray-800" id="modal-title">Add Financial Project</h3>
            <button onclick="closeProjectModal()" class="text-gray-500 hover:text-gray-700" aria-label="Close"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto overscroll-contain">
        <form id="project-form" class="p-6 space-y-4">
            <input type="hidden" id="project-id">
            <div>
                <label class="field-required block text-sm font-medium text-gray-700 mb-2">Project Name</label>
                <input type="text" id="name" required class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g., Buy an Apartment">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Project Type</label>
                <select id="project-type" required class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="real_estate">Real Estate</option>
                    <option value="investment">Investment (DCA, Stocks, etc.)</option>
                    <option value="vehicle">Vehicle</option>
                    <option value="education">Education</option>
                    <option value="vacation">Vacation</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea id="description" rows="2" class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Brief description..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Priority</label>
                    <select id="priority" required class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Deadline (Optional)</label>
                    <input type="date" id="deadline" class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Default Category (for auto-transaction)</label>
                <select id="default-category-id" class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">None (skip auto-transaction)</option>
                </select>
            </div>
            <div class="flex gap-4 pt-4">
                <button type="button" onclick="closeProjectModal()" class="flex-1 px-4 py-3 border rounded-lg hover:bg-gray-50 transition text-sm font-medium">Cancel</button>
                <button type="submit" class="flex-1 px-4 py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition text-sm font-medium">Save Project</button>
            </div>
        </form>
        </div>
    </div>
</div>

<!-- ===== Payment Timeline Modal ===== -->
<div id="timeline-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] flex items-center justify-center p-2 md:p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-5xl max-h-[95dvh] flex flex-col">
        <div class="p-4 md:p-6 border-b flex justify-between items-center shrink-0">
            <h3 class="text-lg md:text-xl font-bold text-gray-800" id="timeline-title">Payment Timeline</h3>
            <button onclick="closeTimelineModal()" aria-label="Close" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times text-xl"></i></button>
        </div>

        <div class="overflow-y-auto overscroll-contain flex-1 p-3 md:p-6 space-y-4 md:space-y-6">
            <!-- Payments List (card on mobile, table on desktop) -->
            <div>
                <!-- Desktop table (hidden on mobile) -->
                <div class="hidden md:block overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-left">
                                <th class="px-3 py-2">#</th>
                                <th class="px-3 py-2">Due Date</th>
                                <th class="px-3 py-2">Amount</th>
                                <th class="px-3 py-2">Notes</th>
                                <th class="px-3 py-2">Status</th>
                                <th class="px-3 py-2">Tx</th>
                                <th class="px-3 py-2">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="payments-table-body"></tbody>
                    </table>
                </div>
                <!-- Mobile card list (shown on mobile only) -->
                <div id="payments-card-list" class="md:hidden space-y-2"></div>
            </div>

            <!-- Footer Totals -->
            <div class="bg-gray-50 rounded-lg p-3 md:p-4 text-sm grid grid-cols-2 md:grid-cols-4 gap-3" id="payments-totals"></div>

            <!-- Linked Transactions Section (#9) -->
            <div class="border rounded-lg p-4">
                <h4 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                    <i class="fas fa-receipt text-green-500 text-sm"></i>
                    Linked Transactions
                </h4>
                <div id="project-transactions-list" class="space-y-1 text-sm text-gray-500">
                    <p>Loading...</p>
                </div>
            </div>

            <!-- Add Single Payment -->
            <div class="border rounded-lg p-3 md:p-4">
                <h4 class="font-semibold text-gray-700 mb-3">Add Single Payment</h4>
                <form id="add-payment-form" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 items-end">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Due Date (optional)</label>
                        <input type="date" id="new-payment-date" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Amount (VND) *</label>
                        <input type="number" id="new-payment-amount" required min="1" step="1" placeholder="Amount" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Notes</label>
                        <input type="text" id="new-payment-notes" placeholder="Optional notes" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <button type="submit" class="w-full bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition text-sm">
                            <i class="fas fa-plus mr-1"></i>Add Payment
                        </button>
                    </div>
                </form>
            </div>

            <!-- Generate Recurring Schedule -->
            <div class="border rounded-lg p-4">
                <button onclick="toggleRecurring()" class="font-semibold text-gray-700 flex items-center gap-2 w-full">
                    <i id="recurring-chevron" class="fas fa-chevron-right text-xs"></i>
                    Generate Recurring Schedule (DCA)
                </button>
                <div id="recurring-section" class="hidden mt-4">
                    <form id="recurring-form" class="grid grid-cols-2 md:grid-cols-3 gap-3 items-end">
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">Amount per installment *</label>
                            <input type="number" id="rec-amount" required min="1" step="1" placeholder="Amount" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">Start Date *</label>
                            <input type="date" id="rec-start-date" required class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">Interval *</label>
                            <select id="rec-interval" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                                <option value="weekly">Weekly</option>
                                <option value="biweekly">Biweekly</option>
                                <option value="monthly" selected>Monthly</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">Number of installments *</label>
                            <input type="number" id="rec-occurrences" required min="1" max="120" placeholder="e.g. 12" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">Notes (all rows)</label>
                            <input type="text" id="rec-notes" placeholder="Optional" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <button type="submit" class="w-full bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition text-sm">
                                <i class="fas fa-magic mr-1"></i>Generate Schedule
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== Edit Payment Modal ===== -->
<div id="edit-payment-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-30 z-[105] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6">
        <h4 class="font-semibold text-gray-800 mb-4">Edit Payment</h4>
        <input type="hidden" id="edit-payment-id">
        <div class="space-y-3">
            <div>
                <label class="block text-xs text-gray-600 mb-1">Due Date (optional)</label>
                <input type="date" id="edit-payment-date" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label class="block text-xs text-gray-600 mb-1">Amount (VND) *</label>
                <input type="number" id="edit-payment-amount" required min="1" step="1" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label class="block text-xs text-gray-600 mb-1">Notes</label>
                <input type="text" id="edit-payment-notes" placeholder="Optional notes" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
            </div>
        </div>
        <div class="flex gap-3 mt-5">
            <button onclick="closeEditPaymentModal()" class="flex-1 px-4 py-2.5 border rounded-lg hover:bg-gray-50 text-sm font-medium">Cancel</button>
            <button onclick="saveEditPayment()" class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Save Changes</button>
        </div>
    </div>
</div>

<!-- ===== Mark Paid Pop-over ===== -->
<div id="mark-paid-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-30 z-[105] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6">
        <h4 class="font-semibold text-gray-800 mb-4">Mark as Paid</h4>
        <input type="hidden" id="mark-paid-payment-id">
        <div class="space-y-3">
            <div>
                <label class="block text-xs text-gray-600 mb-1">Category (required for auto-transaction)</label>
                <select id="mark-paid-category" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                    <option value="">— skip transaction —</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-600 mb-1">Date Paid</label>
                <input type="date" id="mark-paid-date" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
            </div>
        </div>
        <div class="flex gap-3 mt-5">
            <button onclick="closeMarkPaidModal()" class="flex-1 px-4 py-2.5 border rounded-lg hover:bg-gray-50 text-sm font-medium">Cancel</button>
            <button onclick="confirmMarkPaid()" class="flex-1 px-4 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium">Confirm Paid</button>
        </div>
    </div>
</div>

<script>
    let allCategories = [];
    let currentTimelineProjectId = null;
    let currentTimelineProjectName = '';
    let currentTimelineDefaultCatId = '';

    const todayStr = () => new Date().toISOString().split('T')[0];

    document.addEventListener('DOMContentLoaded', function() {
        loadProjectCategories();
    });

    // Inject filter params into HTMX projects grid request
    document.addEventListener('htmx:configRequest', function(evt) {
        if (evt.target && evt.target.id === 'projects-grid-region') {
            evt.detail.parameters.status = document.getElementById('filter-status').value;
            evt.detail.parameters.project_type = document.getElementById('filter-type').value;
        }
    });

    function _reloadProjects() {
        document.body.dispatchEvent(new CustomEvent('projects-updated'));
    }

    async function loadProjectCategories() {
        try {
            const res = await fetch('/api/categories/');
            allCategories = await res.json();
            populateCategorySelects();
        } catch(e) { console.error(e); }
    }

    function populateCategorySelects() {
        const expCats = allCategories.filter(c => c.type === 'expense' && c.is_active);
        const defSel = document.getElementById('default-category-id');
        defSel.replaceChildren();
        const defPlaceholder = document.createElement('option');
        defPlaceholder.value = '';
        defPlaceholder.textContent = 'None (skip auto-transaction)';
        defSel.appendChild(defPlaceholder);
        expCats.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name;
            defSel.appendChild(opt);
        });
        const mpSel = document.getElementById('mark-paid-category');
        mpSel.replaceChildren();
        const mpPlaceholder = document.createElement('option');
        mpPlaceholder.value = '';
        mpPlaceholder.textContent = '— skip transaction —';
        mpSel.appendChild(mpPlaceholder);
        expCats.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name;
            mpSel.appendChild(opt);
        });
    }


    // ---- Project modal ----
    function openProjectModal() {
        document.getElementById('modal-title').textContent = 'Add Financial Project';
        document.getElementById('project-form').reset();
        document.getElementById('project-id').value = '';
        document.getElementById('project-modal').classList.remove('hidden');
    }

    function closeProjectModal() {
        document.getElementById('project-modal').classList.add('hidden');
    }

    async function editProject(id) {
        try {
            const res = await fetch('/api/projects/' + id);
            const project = await res.json();
            document.getElementById('modal-title').textContent = 'Edit Project';
            document.getElementById('project-id').value = project.id;
            document.getElementById('name').value = project.name;
            document.getElementById('project-type').value = project.type;
            document.getElementById('description').value = project.description || '';
            document.getElementById('priority').value = project.priority;
            document.getElementById('deadline').value = project.deadline || '';
            document.getElementById('default-category-id').value = project.default_category_id || '';
            document.getElementById('project-modal').classList.remove('hidden');
        } catch(e) { showToast('Failed to load project', 'error'); }
    }

    document.getElementById('project-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const projectId = document.getElementById('project-id').value;
        const defCat    = document.getElementById('default-category-id').value;
        const data = {
            name:                document.getElementById('name').value,
            type:                document.getElementById('project-type').value,
            description:         document.getElementById('description').value,
            priority:            document.getElementById('priority').value,
            deadline:            document.getElementById('deadline').value || null,
            default_category_id: defCat ? parseInt(defCat) : null,
        };
        try {
            const url    = projectId ? '/api/projects/' + projectId : '/api/projects/';
            const method = projectId ? 'PUT' : 'POST';
            const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            if (res.ok) {
                const saved = await res.json();
                closeProjectModal();
                _reloadProjects();
                if (!projectId) openTimelineModal(saved.id, saved.name);
            } else {
                const err = await res.json();
                showToast('Error: ' + (typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail), 'error');
            }
        } catch(e) { console.error(e); showToast('Failed to save project', 'error'); }
    });

    function deleteProject(id) {
        showConfirm('Delete this project?', async function() {
            try {
                const res = await fetch('/api/projects/' + id, { method:'DELETE' });
                if (res.ok) { _reloadProjects(); showToast('Project deleted', 'success'); }
                else { showToast('Failed to delete project', 'error'); }
            } catch(e) { console.error(e); showToast('Failed to delete project', 'error'); }
        }, 'Delete', 'bg-red-600 hover:bg-red-700');
    }

    // ---- Timeline modal ----
    async function openTimelineModal(projectId, projectName) {
        currentTimelineProjectId = projectId;
        currentTimelineProjectName = projectName || '';
        currentTimelineDefaultCatId = '';
        document.getElementById('timeline-title').textContent =
            'Payment Timeline' + (currentTimelineProjectName ? ' — ' + currentTimelineProjectName : '');
        document.getElementById('add-payment-form').reset();
        document.getElementById('recurring-form').reset();
        document.getElementById('timeline-modal').classList.remove('hidden');
        // Fetch project to get default_category_id
        fetch('/api/projects/' + projectId).then(r => r.json()).then(p => {
            currentTimelineDefaultCatId = p.default_category_id ? String(p.default_category_id) : '';
        }).catch(() => {});
        await Promise.all([loadPayments(), loadProjectTransactions()]);
    }

    function closeTimelineModal() {
        document.getElementById('timeline-modal').classList.add('hidden');
        currentTimelineProjectId = null;
        currentTimelineProjectName = '';
        currentTimelineDefaultCatId = '';
        _reloadProjects();
    }

    async function loadPayments() {
        if (!currentTimelineProjectId) return;
        try {
            const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments');
            const payments = await res.json();
            renderPaymentsTable(payments);
        } catch(e) { console.error(e); }
    }

    function _buildPaymentActions(p) {
        const wrap = document.createElement('div');
        wrap.className = 'flex gap-1 flex-wrap';
        if (p.status === 'paid') {
            const undoBtn = document.createElement('button');
            undoBtn.className = 'text-xs text-gray-500 hover:text-gray-700 px-2 py-1 rounded hover:bg-gray-100';
            undoBtn.textContent = 'Undo';
            undoBtn.onclick = () => undoPayment(p.id);
            wrap.appendChild(undoBtn);
        } else {
            const paidBtn = document.createElement('button');
            paidBtn.className = 'text-xs text-green-600 hover:text-green-800 px-2 py-1 rounded hover:bg-green-50 font-medium';
            paidBtn.textContent = 'Mark Paid';
            paidBtn.onclick = () => openMarkPaidModal(p.id, p.due_date, p.amount);
            wrap.appendChild(paidBtn);
        }
        const editPayBtn = document.createElement('button');
        editPayBtn.className = 'text-xs text-blue-500 hover:text-blue-700 px-2 py-1 rounded hover:bg-blue-50';
        editPayBtn.title = 'Edit';
        const editPayIco = document.createElement('i');
        editPayIco.className = 'fas fa-pencil-alt';
        editPayBtn.appendChild(editPayIco);
        editPayBtn.onclick = () => openEditPaymentModal(p);
        wrap.appendChild(editPayBtn);
        const delBtn = document.createElement('button');
        delBtn.className = 'text-xs text-red-500 hover:text-red-700 px-2 py-1 rounded hover:bg-red-50';
        delBtn.textContent = 'Del';
        delBtn.onclick = () => deletePayment(p.id);
        wrap.appendChild(delBtn);
        return wrap;
    }

    function renderPaymentsTable(payments) {
        const tbody = document.getElementById('payments-table-body');
        const cardList = document.getElementById('payments-card-list');
        tbody.replaceChildren();
        cardList.replaceChildren();

        let totalAmt = 0, paidAmt = 0;
        payments.forEach((p, idx) => {
            totalAmt += p.amount;
            if (p.status === 'paid') paidAmt += p.amount;

            const isPaid = p.status === 'paid';
            const badgeCls = isPaid
                ? 'px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-medium'
                : 'px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium';
            const dateStr = p.due_date ? formatDate(p.due_date) : 'TBD';

            // ── Desktop table row ──────────────────────────────────────────────
            const tr = document.createElement('tr');
            tr.className = 'border-b hover:bg-gray-50';

            const tdIdx = document.createElement('td');
            tdIdx.className = 'px-3 py-2 text-gray-500';
            tdIdx.textContent = idx + 1;
            tr.appendChild(tdIdx);

            const tdDate = document.createElement('td');
            tdDate.className = 'px-3 py-2 text-gray-800';
            if (p.due_date) {
                tdDate.textContent = dateStr;
            } else {
                const tbd = document.createElement('span');
                tbd.className = 'text-gray-400';
                tbd.textContent = 'TBD';
                tdDate.appendChild(tbd);
            }
            tr.appendChild(tdDate);

            const tdAmt = document.createElement('td');
            tdAmt.className = 'px-3 py-2 font-medium text-gray-800';
            tdAmt.textContent = formatVND(p.amount);
            tr.appendChild(tdAmt);

            const tdNotes = document.createElement('td');
            tdNotes.className = 'px-3 py-2 text-gray-500 max-w-xs truncate';
            tdNotes.textContent = p.notes || '';
            tr.appendChild(tdNotes);

            const tdStatus = document.createElement('td');
            tdStatus.className = 'px-3 py-2';
            const badge = document.createElement('span');
            badge.className = badgeCls;
            badge.textContent = isPaid ? 'Paid' : 'Pending';
            tdStatus.appendChild(badge);
            tr.appendChild(tdStatus);

            const tdTx = document.createElement('td');
            tdTx.className = 'px-3 py-2';
            if (p.transaction_id) {
                const a = document.createElement('a');
                a.href = '/transactions?highlight=' + p.transaction_id;
                a.className = 'text-blue-500 hover:text-blue-700';
                a.title = 'View transaction';
                a.setAttribute('aria-label', 'View linked transaction');
                const linkIco = document.createElement('i');
                linkIco.className = 'fas fa-link text-xs';
                a.appendChild(linkIco);
                tdTx.appendChild(a);
            }
            tr.appendChild(tdTx);

            const tdAct = document.createElement('td');
            tdAct.className = 'px-3 py-2';
            tdAct.appendChild(_buildPaymentActions(p));
            tr.appendChild(tdAct);
            tbody.appendChild(tr);

            // ── Mobile card ────────────────────────────────────────────────────
            const card = document.createElement('div');
            card.className = 'border rounded-lg p-3 ' + (isPaid ? 'bg-green-50 border-green-200' : 'bg-white');

            const cardTop = document.createElement('div');
            cardTop.className = 'flex items-start justify-between gap-2';

            const cardLeft = document.createElement('div');
            cardLeft.className = 'flex-1 min-w-0';

            const cardNum = document.createElement('span');
            cardNum.className = 'text-xs text-gray-400 mr-2';
            cardNum.textContent = '#' + (idx + 1);
            cardLeft.appendChild(cardNum);

            const cardDate = document.createElement('span');
            cardDate.className = 'text-sm font-semibold text-gray-800';
            cardDate.textContent = dateStr;
            cardLeft.appendChild(cardDate);

            if (p.notes) {
                const cardNotes = document.createElement('p');
                cardNotes.className = 'text-xs text-gray-500 mt-0.5 truncate';
                cardNotes.textContent = p.notes;
                cardLeft.appendChild(cardNotes);
            }

            const cardRight = document.createElement('div');
            cardRight.className = 'text-right flex-shrink-0';

            const cardAmt = document.createElement('p');
            cardAmt.className = 'text-sm font-bold text-gray-800';
            cardAmt.textContent = formatVND(p.amount);
            cardRight.appendChild(cardAmt);

            const cardBadge = document.createElement('span');
            cardBadge.className = badgeCls + ' mt-1 inline-block';
            cardBadge.textContent = isPaid ? 'Paid' : 'Pending';
            cardRight.appendChild(cardBadge);

            if (p.transaction_id) {
                const txLink = document.createElement('a');
                txLink.href = '/transactions?highlight=' + p.transaction_id;
                txLink.className = 'block text-xs text-blue-500 mt-1';
                txLink.textContent = 'View Tx';
                cardRight.appendChild(txLink);
            }

            cardTop.appendChild(cardLeft);
            cardTop.appendChild(cardRight);
            card.appendChild(cardTop);

            const cardActions = document.createElement('div');
            cardActions.className = 'mt-2 pt-2 border-t border-gray-100 flex gap-1';
            cardActions.appendChild(_buildPaymentActions(p));
            card.appendChild(cardActions);

            cardList.appendChild(card);
        });

        // Totals
        const remaining = totalAmt - paidAmt;
        const pct = totalAmt > 0 ? Math.round(paidAmt / totalAmt * 100) : 0;
        const totalsEl = document.getElementById('payments-totals');
        totalsEl.replaceChildren();
        [
            { label: 'Total',     value: formatVND(totalAmt),   cls: '' },
            { label: 'Paid',      value: formatVND(paidAmt),    cls: 'text-green-700' },
            { label: 'Remaining', value: formatVND(remaining),  cls: 'text-red-600' },
            { label: 'Progress',  value: pct + '%',             cls: 'text-blue-600' },
        ].forEach(item => {
            const div = document.createElement('div');
            const lbl = document.createElement('p');
            lbl.className = 'text-xs text-gray-500';
            lbl.textContent = item.label;
            const val = document.createElement('p');
            val.className = 'font-semibold ' + item.cls;
            val.textContent = item.value;
            div.appendChild(lbl);
            div.appendChild(val);
            totalsEl.appendChild(div);
        });
    }

    // ---- Add single payment ----
    document.getElementById('add-payment-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const dueDateVal = document.getElementById('new-payment-date').value;
        const data = {
            amount:   parseFloat(document.getElementById('new-payment-amount').value),
            due_date: dueDateVal || null,
            notes:    document.getElementById('new-payment-notes').value || null,
        };
        try {
            const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
            });
            if (res.ok) {
                document.getElementById('add-payment-form').reset();
                await loadPayments();
            } else {
                const err = await res.json();
                showToast('Error: ' + (typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail), 'error');
            }
        } catch(e) { console.error(e); showToast('Failed to add payment', 'error'); }
    });

    function deletePayment(paymentId) {
        showConfirm('Delete this payment? Any linked transaction will remain in history.', async function() {
            try {
                const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments/' + paymentId, { method:'DELETE' });
                if (res.ok) await loadPayments();
                else { showToast('Failed to delete payment', 'error'); }
            } catch(e) { console.error(e); showToast('Failed to delete payment', 'error'); }
        }, 'Delete', 'bg-red-600 hover:bg-red-700');
    }

    // ---- Edit Payment modal ----
    function openEditPaymentModal(payment) {
        document.getElementById('edit-payment-id').value = payment.id;
        document.getElementById('edit-payment-date').value = payment.due_date || '';
        document.getElementById('edit-payment-amount').value = payment.amount;
        document.getElementById('edit-payment-notes').value = payment.notes || '';
        document.getElementById('edit-payment-modal').classList.remove('hidden');
    }

    function closeEditPaymentModal() {
        document.getElementById('edit-payment-modal').classList.add('hidden');
    }

    async function saveEditPayment() {
        const paymentId = document.getElementById('edit-payment-id').value;
        const dueDateVal = document.getElementById('edit-payment-date').value;
        const amountVal = document.getElementById('edit-payment-amount').value;
        const notesVal = document.getElementById('edit-payment-notes').value;
        if (!amountVal || parseFloat(amountVal) <= 0) { showToast('Amount is required', 'error'); return; }
        const body = {
            due_date: dueDateVal || null,
            amount:   parseFloat(amountVal),
            notes:    notesVal || null,
        };
        try {
            const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments/' + paymentId, {
                method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
            });
            if (res.ok) {
                closeEditPaymentModal();
                await loadPayments();
            } else {
                const err = await res.json();
                showToast('Error: ' + (typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail), 'error');
            }
        } catch(e) { console.error(e); showToast('Failed to save payment', 'error'); }
    }

    // ---- Mark Paid modal ----
    function openMarkPaidModal(paymentId, dueDate, amount) {
        document.getElementById('mark-paid-payment-id').value = paymentId;
        document.getElementById('mark-paid-date').value = dueDate || todayStr();
        document.getElementById('mark-paid-category').value = currentTimelineDefaultCatId;
        document.getElementById('mark-paid-modal').classList.remove('hidden');
    }

    function closeMarkPaidModal() {
        document.getElementById('mark-paid-modal').classList.add('hidden');
    }

    async function confirmMarkPaid() {
        const paymentId  = document.getElementById('mark-paid-payment-id').value;
        const categoryId = document.getElementById('mark-paid-category').value;
        const paidDate   = document.getElementById('mark-paid-date').value;
        const body = { status: 'paid', payment_date: paidDate || null };
        if (categoryId) body.category_id = parseInt(categoryId);
        try {
            const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments/' + paymentId, {
                method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
            });
            if (res.ok) {
                closeMarkPaidModal();
                await loadPayments();
            } else {
                const err = await res.json();
                showToast('Error: ' + (typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail), 'error');
            }
        } catch(e) { console.error(e); showToast('Failed to update payment', 'error'); }
    }

    async function undoPayment(paymentId) {
        try {
            const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments/' + paymentId, {
                method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'pending'})
            });
            if (res.ok) await loadPayments();
        } catch(e) { console.error(e); }
    }

    // ---- Project transactions (#9) ----
    async function loadProjectTransactions() {
        if (!currentTimelineProjectId) return;
        const container = document.getElementById('project-transactions-list');
        while (container.firstChild) container.removeChild(container.firstChild);
        const loadingP = document.createElement('p');
        loadingP.textContent = 'Loading...';
        container.appendChild(loadingP);
        try {
            const res = await fetch('/api/transactions/?project_id=' + currentTimelineProjectId + '&limit=50');
            const txns = await res.json();
            while (container.firstChild) container.removeChild(container.firstChild);
            if (txns.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-gray-400 italic';
                empty.textContent = 'No linked transactions yet.';
                container.appendChild(empty);
                return;
            }
            let totalAmount = 0;
            txns.forEach(function(t) {
                totalAmount += t.amount;
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between py-1 border-b last:border-0';

                const left = document.createElement('div');
                left.className = 'flex items-center gap-2 flex-1 min-w-0';

                const dateSpan = document.createElement('span');
                dateSpan.className = 'text-gray-500 flex-shrink-0';
                dateSpan.textContent = formatDate(t.date);

                const catSpan = document.createElement('span');
                catSpan.className = 'text-xs px-1.5 py-0.5 rounded flex-shrink-0';
                catSpan.style.backgroundColor = (t.category.color || '#ccc') + '20';
                catSpan.style.color = t.category.color || '#666';
                catSpan.textContent = t.category.name;

                left.appendChild(dateSpan);
                left.appendChild(catSpan);

                if (t.description) {
                    const descSpan = document.createElement('span');
                    descSpan.className = 'text-gray-500 truncate';
                    descSpan.textContent = t.description;
                    left.appendChild(descSpan);
                }

                const amtSpan = document.createElement('span');
                amtSpan.className = 'font-semibold text-red-600 flex-shrink-0 ml-2';
                amtSpan.textContent = '-' + formatVND(t.amount);

                row.appendChild(left);
                row.appendChild(amtSpan);
                container.appendChild(row);
            });

            const totalRow = document.createElement('div');
            totalRow.className = 'flex justify-between pt-2 font-semibold text-gray-700 border-t mt-1';
            const totalLbl = document.createElement('span');
            totalLbl.textContent = 'Total (' + txns.length + ' transaction' + (txns.length !== 1 ? 's' : '') + ')';
            const totalAmtSpan = document.createElement('span');
            totalAmtSpan.className = 'text-red-600';
            totalAmtSpan.textContent = '-' + formatVND(totalAmount);
            totalRow.appendChild(totalLbl);
            totalRow.appendChild(totalAmtSpan);
            container.appendChild(totalRow);
        } catch(e) {
            while (container.firstChild) container.removeChild(container.firstChild);
            const errP = document.createElement('p');
            errP.className = 'text-red-500';
            errP.textContent = 'Failed to load transactions.';
            container.appendChild(errP);
        }
    }

    // ---- Recurring schedule ----
    function toggleRecurring() {
        const section  = document.getElementById('recurring-section');
        const chevron  = document.getElementById('recurring-chevron');
        const isHidden = section.classList.contains('hidden');
        section.classList.toggle('hidden', !isHidden);
        chevron.className = isHidden ? 'fas fa-chevron-down text-xs' : 'fas fa-chevron-right text-xs';
    }

    document.getElementById('recurring-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = {
            amount:      parseFloat(document.getElementById('rec-amount').value),
            start_date:  document.getElementById('rec-start-date').value,
            interval:    document.getElementById('rec-interval').value,
            occurrences: parseInt(document.getElementById('rec-occurrences').value),
            notes:       document.getElementById('rec-notes').value || null,
        };
        try {
            const res = await fetch('/api/projects/' + currentTimelineProjectId + '/payments/bulk', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
            });
            if (res.ok) {
                document.getElementById('recurring-form').reset();
                await loadPayments();
            } else {
                const err = await res.json();
                showToast('Error: ' + (typeof err.detail === 'object' ? JSON.stringify(err.detail) : err.detail), 'error');
            }
        } catch(e) { console.error(e); showToast('Failed to generate schedule', 'error'); }
    });
</script>
