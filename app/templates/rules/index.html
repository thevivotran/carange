{% extends "base.html" %}

{% block content %}
<div class="p-6 pb-28 max-w-5xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Rules</h2>
            <p class="text-gray-600 mt-1">Auto-classify transactions on every email and OCR import by matching description, amount, or source. For merchant name matching, use <a href="/payees" class="text-primary hover:underline">Payees</a>.</p>
        </div>
        <button onclick="openCreateModal()"
                class="bg-primary text-white px-5 py-2.5 rounded-lg hover:bg-blue-600 transition flex items-center gap-2">
            <i class="fas fa-plus"></i> Add Rule
        </button>
    </div>

    <!-- Rules table -->
    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
        <div id="rules-list" hx-get="/fragments/rules/list" hx-trigger="load, rules-updated from:body" hx-swap="innerHTML">
            <div class="flex justify-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl"></i>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Rule Modal -->
<div id="rule-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg">
        <div class="p-6 border-b">
            <h3 id="modal-title" class="text-xl font-bold text-gray-800">Add Rule</h3>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="rule-id">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Rule name</label>
                <input type="text" id="rule-name" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary" placeholder="e.g. GrabFood → Food">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Match field</label>
                    <select id="rule-field" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        <option value="description">Description</option>
                        <option value="amount">Amount</option>
                        <option value="payment_method">Payment method</option>
                        <option value="source">Source</option>
                        <option value="payee_id">Payee ID</option>
                        <option value="type">Type</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Operator</label>
                    <select id="rule-op" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        <option value="contains">Contains</option>
                        <option value="equals">Equals</option>
                        <option value="regex">Regex</option>
                        <option value="range">Range (min,max)</option>
                        <option value="in">In (a,b,c)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Value</label>
                <input type="text" id="rule-value" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary" placeholder="e.g. GrabFood">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Set category</label>
                <select id="rule-category" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                    <option value="">-- No change --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }} ({{ cat.type.value }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" id="rule-approve" class="rounded text-primary">
                <label for="rule-approve" class="text-sm text-gray-700">Auto-approve (skip review)</label>
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" id="rule-active" class="rounded text-primary" checked>
                <label for="rule-active" class="text-sm text-gray-700">Active</label>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Priority <span class="text-gray-400 font-normal">(lower number = higher priority)</span></label>
                <input type="number" id="rule-priority" value="0" min="0" class="w-24 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
            </div>
        </div>
        <div class="p-6 border-t flex justify-end gap-3">
            <button onclick="closeModal()" class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">Cancel</button>
            <button onclick="saveRule()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-blue-600 transition">Save</button>
        </div>
    </div>
</div>

<script>
let _editId = null;

// ── Field/operator coupling ────────────────────────────────────────────────
const _numericFields = new Set(['amount']);
const _opMeta = {
    contains: { label: 'Contains',          numeric: false },
    equals:   { label: 'Equals',            numeric: true  },
    regex:    { label: 'Regex',             numeric: false },
    range:    { label: 'Range (min,max)',   numeric: true  },
    in:       { label: 'In (a,b,c)',        numeric: false },
};
const _placeholders = {
    description:    'e.g. GrabFood',
    amount_equals:  'e.g. 150000',
    amount_range:   'e.g. 50000,200000',
    payment_method: 'e.g. momo',
    source:         'e.g. email',
    payee_id:       'e.g. 42',
    type:           'income or expense',
};

function _syncOps() {
    const field = document.getElementById('rule-field').value;
    const isNumeric = _numericFields.has(field);
    const opSel = document.getElementById('rule-op');
    const prevVal = opSel.value;
    Array.from(opSel.options).forEach(function(opt) {
        const meta = _opMeta[opt.value];
        opt.hidden = meta ? (isNumeric ? !meta.numeric : opt.value === 'range') : false;
    });
    // Keep current value if still valid, otherwise pick first visible
    if (opSel.options[opSel.selectedIndex] && opSel.options[opSel.selectedIndex].hidden) {
        opSel.value = Array.from(opSel.options).find(o => !o.hidden)?.value || '';
    }
    _syncPlaceholder();
}

function _syncPlaceholder() {
    const field = document.getElementById('rule-field').value;
    const op    = document.getElementById('rule-op').value;
    const key   = field === 'amount' ? ('amount_' + op) : field;
    document.getElementById('rule-value').placeholder = _placeholders[key] || 'e.g. value';
}

function openCreateModal(prefill) {
    _editId = null;
    document.getElementById('modal-title').textContent = 'Add Rule';
    document.getElementById('rule-id').value = '';
    document.getElementById('rule-name').value = prefill?.name || '';
    document.getElementById('rule-field').value = prefill?.match_field || 'description';
    _syncOps();
    document.getElementById('rule-op').value = prefill?.match_op || 'contains';
    _syncPlaceholder();
    document.getElementById('rule-value').value = prefill?.match_value || '';
    document.getElementById('rule-category').value = prefill?.action_json?.set_category_id || '';
    document.getElementById('rule-approve').checked = prefill?.action_json?.auto_approve || false;
    document.getElementById('rule-active').checked = true;
    document.getElementById('rule-priority').value = 0;
    document.getElementById('rule-modal').classList.remove('hidden');
}

function openEditModal(rule) {
    _editId = rule.id;
    document.getElementById('modal-title').textContent = 'Edit Rule';
    document.getElementById('rule-name').value = rule.name;
    document.getElementById('rule-field').value = rule.match_field;
    _syncOps();
    document.getElementById('rule-op').value = rule.match_op;
    _syncPlaceholder();
    document.getElementById('rule-value').value = rule.match_value;
    document.getElementById('rule-category').value = rule.action_json?.set_category_id || '';
    document.getElementById('rule-approve').checked = !!rule.action_json?.auto_approve;
    document.getElementById('rule-active').checked = rule.is_active;
    document.getElementById('rule-priority').value = rule.priority;
    document.getElementById('rule-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('rule-modal').classList.add('hidden'); }

async function saveRule() {
    const catId = document.getElementById('rule-category').value;
    const action = {};
    if (catId) action.set_category_id = parseInt(catId);
    action.auto_approve = document.getElementById('rule-approve').checked;

    const body = {
        name: document.getElementById('rule-name').value,
        match_field: document.getElementById('rule-field').value,
        match_op: document.getElementById('rule-op').value,
        match_value: document.getElementById('rule-value').value,
        action_json: action,
        is_active: document.getElementById('rule-active').checked,
        priority: parseInt(document.getElementById('rule-priority').value) || 0,
    };

    const url = _editId ? `/api/rules/${_editId}` : '/api/rules/';
    const method = _editId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    if (res.ok) {
        closeModal();
        htmx.trigger(document.body, 'rules-updated');
    } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.detail || 'Failed to save rule', 'error');
    }
}

async function deleteRule(id) {
    showConfirm('Delete this rule?', async function() {
        await fetch(`/api/rules/${id}`, { method: 'DELETE' });
        htmx.trigger(document.body, 'rules-updated');
    }, 'Delete', 'bg-red-600 hover:bg-red-700');
}

// Wire field/op live listeners
document.getElementById('rule-field').addEventListener('change', _syncOps);
document.getElementById('rule-op').addEventListener('change', _syncPlaceholder);

// Load prefill from sessionStorage (set by review inbox "remember as rule")
window.addEventListener('DOMContentLoaded', () => {
    const prefill = sessionStorage.getItem('rule_prefill');
    if (prefill) {
        sessionStorage.removeItem('rule_prefill');
        openCreateModal(JSON.parse(prefill));
    }
});
</script>
{% endblock %}
