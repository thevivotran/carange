{% extends "base.html" %}

{% block content %}
<div class="p-6 pb-28 max-w-5xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Payees</h2>
            <p class="text-gray-600 mt-1">Payee dictionary — normalise transaction names</p>
        </div>
        <button onclick="openCreateModal()"
                class="bg-primary text-white px-5 py-2.5 rounded-lg hover:bg-blue-600 transition flex items-center gap-2">
            <i class="fas fa-plus"></i> Add Payee
        </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
        <div id="payees-list" hx-get="/fragments/payees/list" hx-trigger="load, payees-updated from:body" hx-swap="innerHTML">
            <div class="flex justify-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl"></i>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Payee Modal -->
<div id="payee-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg">
        <div class="p-6 border-b">
            <h3 id="payee-modal-title" class="text-xl font-bold text-gray-800">Add Payee</h3>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="payee-id">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Canonical name</label>
                <input type="text" id="payee-name" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary" placeholder="e.g. Grab Food">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Default category</label>
                <select id="payee-category" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                    <option value="">-- None --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }} ({{ cat.type.value }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Recognition patterns <span class="text-gray-400 font-normal">(one per line)</span></label>
                <textarea id="payee-patterns" rows="4"
                          class="w-full border rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-primary"
                          placeholder="GRAB\*FOOD.*&#10;GrabFood.*&#10;Grab - Food"></textarea>
                <p class="text-xs text-gray-400 mt-1">Case-insensitive regex. One pattern per line.</p>
            </div>
        </div>
        <div class="p-6 border-t flex justify-end gap-3">
            <button onclick="closePayeeModal()" class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">Cancel</button>
            <button onclick="savePayee()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-blue-600 transition">Save</button>
        </div>
    </div>
</div>

<script>
let _editPayeeId = null;

function openCreateModal() {
    _editPayeeId = null;
    document.getElementById('payee-modal-title').textContent = 'Add Payee';
    document.getElementById('payee-name').value = '';
    document.getElementById('payee-category').value = '';
    document.getElementById('payee-patterns').value = '';
    document.getElementById('payee-modal').classList.remove('hidden');
}

function openEditPayeeModal(payee) {
    _editPayeeId = payee.id;
    document.getElementById('payee-modal-title').textContent = 'Edit Payee';
    document.getElementById('payee-name').value = payee.canonical_name;
    document.getElementById('payee-category').value = payee.default_category_id || '';
    document.getElementById('payee-patterns').value = (payee.alias_patterns || []).join('\n');
    document.getElementById('payee-modal').classList.remove('hidden');
}

function closePayeeModal() { document.getElementById('payee-modal').classList.add('hidden'); }

async function savePayee() {
    const patterns = document.getElementById('payee-patterns').value
        .split('\n').map(s => s.trim()).filter(Boolean);
    const catVal = document.getElementById('payee-category').value;

    const body = {
        canonical_name: document.getElementById('payee-name').value,
        default_category_id: catVal ? parseInt(catVal) : null,
        alias_patterns: patterns,
    };

    const url = _editPayeeId ? `/api/payees/${_editPayeeId}` : '/api/payees/';
    const method = _editPayeeId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    if (res.ok) {
        closePayeeModal();
        htmx.trigger(document.body, 'payees-updated');
    } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.detail || 'Failed to save payee', 'error');
    }
}

async function deletePayee(id) {
    showConfirm('Delete this payee?', async function() {
        await fetch(`/api/payees/${id}`, { method: 'DELETE' });
        htmx.trigger(document.body, 'payees-updated');
    }, 'Delete', 'bg-red-600 hover:bg-red-700');
}
</script>
{% endblock %}
