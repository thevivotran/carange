{% if ollama_enabled %}
<div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 p-4">
  <div class="flex items-center gap-2 mb-3">
    <svg class="w-4 h-4 text-primary flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
    <p class="text-xs uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">AI Nhận Xét Tuần</p>
  </div>
  {% if digest_text %}
  <p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">{{ digest_text }}</p>
  {% elif this_total == 0 %}
  <p class="text-sm text-gray-400 dark:text-gray-500 italic">Chưa có giao dịch nào trong 7 ngày qua.</p>
  {% else %}
  <p class="text-sm text-gray-400 dark:text-gray-500 italic">Không thể kết nối AI lúc này. Thử lại sau.</p>
  {% endif %}
</div>
{% endif %}
