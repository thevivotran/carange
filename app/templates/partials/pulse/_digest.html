{% if ollama_enabled %}
<div class="bg-white rounded-2xl border border-gray-100 p-4"
     {% if not digest_text %}
     hx-get="/fragments/pulse/digest"
     hx-trigger="every 30s"
     hx-swap="outerHTML"
     {% endif %}>
  <div class="flex items-center gap-2 mb-3">
    <svg class="w-4 h-4 text-primary flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
    <p class="text-xs uppercase tracking-widest text-gray-400 font-semibold">AI Weekly Review</p>
    {% if generated_at %}
    <span class="ml-auto text-xs text-gray-300">{{ generated_at | format_vn_dt }}</span>
    {% endif %}
  </div>
  {% if digest_text %}
  <p class="text-sm text-gray-700 leading-relaxed">{{ digest_text }}</p>
  {% else %}
  <p class="text-sm text-gray-400 italic animate-pulse">Đang tạo phân tích...</p>
  {% endif %}
</div>
{% endif %}
