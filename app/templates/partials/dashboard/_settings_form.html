<form hx-post="/fragments/dashboard/settings"
      hx-target="#settings-modal-body"
      hx-swap="innerHTML">
  <div class="space-y-5">
    <div>
      <label class="block text-xs font-semibold text-gray-600 mb-1">Savings Target (% of income)</label>
      <p class="text-xs text-gray-400 mb-2">Replaces the hardcoded 20M threshold in the Foundation Score.</p>
      <div class="flex items-center gap-2">
        <input name="savings_target_pct" type="number" min="5" max="80" step="1"
          value="{{ savings_target_pct }}"
          class="w-24 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          placeholder="25">
        <span class="text-sm text-gray-500">%</span>
      </div>
    </div>
    <div>
      <label class="block text-xs font-semibold text-gray-600 mb-1">Financial Independence Target (₫)</label>
      <p class="text-xs text-gray-400 mb-2">The net worth you need to be financially free. Powers the FI Progress card.</p>
      <input name="fi_target_vnd" type="number" min="0" step="1000000"
        value="{{ fi_target_vnd }}"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
        placeholder="e.g. 10000000000 (10B ₫)">
    </div>
    <div>
      <label class="block text-xs font-semibold text-gray-600 mb-1">Baby Fund (savings bundle)</label>
      <p class="text-xs text-gray-400 mb-2">Pin a savings bundle as the Baby Fund goal on the dashboard.</p>
      <select name="baby_fund_bundle_id"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
        <option value="">— None —</option>
        {% for b in savings_bundles %}
        <option value="{{ b.id }}" {% if b.id | string == baby_fund_bundle_id %}selected{% endif %}>{{ b.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="flex gap-3 mt-6">
    <button type="button" onclick="closeSettingsModal()"
            class="flex-1 py-2 rounded-xl border text-sm text-gray-600 hover:bg-gray-50 transition">Cancel</button>
    <button type="submit"
            class="flex-1 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition">Save</button>
  </div>
</form>
